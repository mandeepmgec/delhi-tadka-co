<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delhi Tadka Co. | Direct Order</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="favicon/favicon.png">
</head>

<body>

  <!-- Announcement Bar -->
  <div class="announcement">
    🔥 Flat <span id="discountPercent">20</span>% OFF on Direct Orders
  </div>

  <!-- Header -->
  <header>
    <img src="logo/logo.png" class="logo" alt="Delhi Tadka Co Logo">
    <h1>Delhi Tadka Co.</h1>
    <p>Karahi • Makhani • Tawa Classics</p>
    <a href="tel:+918860432553" class="call-btn">📞 Call Now</a>
  </header>

  <!-- Category nav injected by JS -->

  <!-- Menu -->
  <main id="menu"></main>

  <!-- Floating Cart -->
  <div class="cart-button" onclick="openCart()">
    🛒 Cart (<span id="cartCount">0</span>)
  </div>

  <!-- Cart Modal -->
  <div id="cartModal" class="cart-modal">
    <div class="cart-content">
      <div class="cart-header">
        <h2>Your Order</h2>
        <button class="close-btn" onclick="closeCart()">✕</button>
      </div>
      <div id="cartItems"></div>
      <div id="cartTotal"></div>
      <button class="whatsapp-btn" onclick="checkout()" disabled>
        📲 Proceed to Order
      </button>
    </div>
  </div>

  <!-- Address Modal -->
  <div id="addressModal" class="cart-modal">
    <div class="cart-content address-content">
      <div class="cart-header">
        <h2>Delivery Address</h2>
        <button class="close-btn" onclick="closeAddressModal()">✕</button>
      </div>
      <p class="address-hint">We'll include your address in the WhatsApp order message.</p>
      <textarea id="addressInput" class="address-input" rows="4"
        placeholder="House no., street, area, landmark..."></textarea>
      <button class="whatsapp-btn" onclick="confirmOrder()">
        📲 Send Order on WhatsApp
      </button>
    </div>
  </div>

  <script src="js/script.js"></script>

</body>
</html>
